version: '3.8'

services:
  # ---------------------------------------------------------
  # Persistence Layer: Transactional & Metadata Store
  # ---------------------------------------------------------
  biopulse-db:
    image: postgres:16-alpine
    container_name: biopulse-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: biopulse_telemedicine
      POSTGRES_USER: biopulse_admin
      POSTGRES_PASSWORD: dev_secret_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - biopulse-network
    restart: unless-stopped

  # ---------------------------------------------------------
  # Streaming Backbone: Event Broker (KRaft Mode)
  # ---------------------------------------------------------
  biopulse-kafka:
    image: apache/kafka:3.7.0
    container_name: biopulse-kafka
    ports:
      - "9092:9092"
    environment:
      # Cluster Topology Coordination via KRaft (No Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@biopulse-kafka:9093
      # Internal & External Socket Listeners Mapping
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://biopulse-kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - biopulse-network
    restart: unless-stopped

  # ---------------------------------------------------------
  # Workflow Engine: Automation & Clinical Triage Orchestrator
  # ---------------------------------------------------------
  biopulse-camunda:
    image: camunda/camunda-bpm-platform:run-7.20.0
    container_name: biopulse-camunda
    ports:
      - "8080:8080"
    networks:
      - biopulse-network
    restart: unless-stopped

# -----------------------------------------------------------
# Storage & Networking Declarations
# -----------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  kafka_data:
    driver: local

networks:
  biopulse-network:
    driver: bridge